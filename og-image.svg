<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#030810"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="120" cy="80" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="340" cy="45" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="680" cy="30" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="900" cy="90" r="1.5" fill="#ffffff" opacity="0.7"/>
  <circle cx="1050" cy="55" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="200" cy="520" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="480" cy="580" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="760" cy="560" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="1000" cy="510" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="60" cy="300" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="1150" cy="320" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="820" cy="150" r="1" fill="#4fc3f7" opacity="0.6"/>
  <circle cx="380" cy="480" r="1.5" fill="#4fc3f7" opacity="0.5"/>
  <circle cx="950" cy="400" r="1" fill="#f9a825" opacity="0.7"/>
  <circle cx="150" cy="420" r="1.5" fill="#4fc3f7" opacity="0.4"/>

  <!-- Top accent line -->
  <line x1="0" y1="4" x2="1200" y2="4" stroke="#00b4ff" stroke-width="2" opacity="0.4"/>
  <!-- Bottom accent line -->
  <line x1="0" y1="626" x2="1200" y2="626" stroke="#00b4ff" stroke-width="2" opacity="0.4"/>

  <!-- Corner brackets -->
  <path d="M40,40 L40,20 L60,20" stroke="#00b4ff" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M1160,40 L1160,20 L1140,20" stroke="#00b4ff" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M40,590 L40,610 L60,610" stroke="#00b4ff" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M1160,590 L1160,610 L1140,610" stroke="#00b4ff" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- Main title: Data Vault -->
  <text x="600" y="240" text-anchor="middle" font-family="monospace, sans-serif" font-size="96" font-weight="700" fill="#e2e8f0" filter="url(#glow)">Data Vault</text>

  <!-- Main title: Foundations (cyan) -->
  <text x="600" y="350" text-anchor="middle" font-family="monospace, sans-serif" font-size="96" font-weight="700" fill="#00b4ff" filter="url(#glow2)">Foundations</text>

  <!-- Subtitle -->
  <text x="600" y="430" text-anchor="middle" font-family="monospace, sans-serif" font-size="26" fill="#94a3b8">14 Interactive Chapters · Data Vault 2.0 · SQL · dbt · EU Compliance</text>

  <!-- URL tag -->
  <rect x="430" y="500" width="340" height="44" rx="6" fill="#00b4ff" opacity="0.12"/>
  <text x="600" y="529" text-anchor="middle" font-family="monospace, sans-serif" font-size="20" fill="#00b4ff" opacity="0.9">datavault-foundations.netlify.app</text>
</svg>
